site_name: Seizure-Safe Schools - An Intelligent Textbook
site_description: A plain-language, interactive guide to epilepsy, seizure first aid, and Minnesota's seizure-safety law, with the data behind the gaps in Minnesota schools.
site_author: Rishik Kondadadi, Epilepsy Data & Advocacy Network (EDAN)
# Set these two when you create the GitHub repo:
site_url: https://fieryknight2010.github.io/seizure-safe-schools/
repo_url: https://github.com/fieryknight2010/seizure-safe-schools
repo_name: seizure-safe-schools
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.tooltips
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - css/extra.css

nav:
  - Home: index.md
  - About EDAN: about.md
  - Find Your District: find-your-district/index.md
  - 'Chapters':
    - '0. Introduction': chapters/00-introduction/index.md
    - '1. Understanding Epilepsy': chapters/01-understanding-epilepsy/index.md
    - '2. Seizure First Aid': chapters/02-seizure-first-aid/index.md
    - '3. The Minnesota Law (121A.24)': chapters/03-minnesota-law/index.md
    - '4. Seizure Action Plans': chapters/04-seizure-action-plans/index.md
    - '5. The Data: Mapping the Gaps': chapters/05-the-data-case-study/index.md
    - '6. How to Help': chapters/06-how-to-help/index.md
    - '7. Your Child''s Rights (504/IEP)': chapters/07-your-childs-rights/index.md
    - '8. For Schools: In Practice': chapters/08-for-schools-in-practice/index.md
  - 'Interactive Sims':
    - 'Seizure First Aid Simulator': sims/seizure-first-aid/index.md
    - 'Is This a Seizure?': sims/recognize-seizure/index.md
    - 'Call 911? Decision Trainer': sims/call-911/index.md
    - '504 vs IEP Path-Finder': sims/504-vs-iep/index.md
  - Resources & Support: resources/index.md
  - FAQ: faq.md
  - Glossary: glossary.md
